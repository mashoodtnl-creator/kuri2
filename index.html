<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic Cafe Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f4f4;
}

header{
    background:#6b3e26;
    color:white;
    padding:15px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:15px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,.2);
}

.card h3{
    margin:0;
    color:#555;
}

.card p{
    font-size:22px;
    font-weight:bold;
    color:#6b3e26;
}

.section{
    background:white;
    margin-top:15px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.2);
}

input,button{
    width:100%;
    padding:10px;
    margin-top:8px;
    box-sizing:border-box;
}

button{
    background:#6b3e26;
    color:white;
    border:none;
    border-radius:5px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

th{
    background:#6b3e26;
    color:white;
}
</style>
</head>

<body>

<header>
☕ Classic Cafe Dashboard
</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>Total Sales</h3>
<p id="sales">₹0</p>
</div>

<div class="card">
<h3>Expenses</h3>
<p id="expense">₹0</p>
</div>

<div class="card">
<h3>Cash Balance</h3>
<p id="cash">₹0</p>
</div>

<div class="card">
<h3>Paytm Balance</h3>
<p id="paytm">₹0</p>
</div>

<div class="card">
<h3>Profit</h3>
<p id="profit">₹0</p>
</div>

</div>

<!-- Sales Entry -->

<div class="section">
<h2>Sales Entry</h2>

<input type="number" id="saleInput" placeholder="Enter Sale Amount">

<button onclick="addSale()">
Add Sale
</button>
</div>

<!-- Expense Entry -->

<div class="section">
<h2>Expense Entry</h2>

<input type="number" id="expenseInput" placeholder="Enter Expense Amount">

<button onclick="addExpense()">
Add Expense
</button>
</div>

<!-- Stock -->

<div class="section">
<h2>Stock List</h2>

<input type="text" id="stockName" placeholder="Item Name">

<input type="number" id="stockQty" placeholder="Quantity">

<button onclick="addStock()">
Add Stock
</button>

<table>
<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="stockTable">
</tbody>

</table>
</div>

<!-- Staff -->

<div class="section">
<h2>Staff Management</h2>

<input type="text" id="staffName" placeholder="Staff Name">

<input type="number" id="staffSalary" placeholder="Salary">

<button onclick="addStaff()">
Add Staff
</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Salary</th>
</tr>
</thead>

<tbody id="staffTable">
</tbody>

</table>

</div>

<script>
