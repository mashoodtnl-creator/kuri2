<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mashood Kuri Pro</title>
    <style>
        body { font-family: sans-serif; background: #050b07; color: white; margin: 0; padding: 20px; }
        .card { background: #121e17; padding: 20px; border-radius: 15px; border: 1px solid #dfb73c; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat { background: #000; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .btn { background: #dfb73c; color: #000; padding: 15px; width: 100%; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="app">
        <h2>അഡ്മിൻ ഡാഷ്‌ബോർഡ്</h2>
        <div class="grid">
            <div class="stat">മെമ്പർമാർ<br><b>120</b></div>
            <div class="stat">പിരിവ്<br><b>₹1.2L</b></div>
        </div>
        
        <div class="card">
            <h3>ലക്കി ഡ്രോ</h3>
            <button class="btn" onclick="startDraw()">വിജയിയെ കണ്ടെത്തുക 🎲</button>
            <h3 id="winner"></h3>
        </div>
    </div>

    <script>
        function startDraw() {
            const winner = document.getElementById('winner');
            winner.innerText = "🎉 വിജയിയെ തിരഞ്ഞെടുക്കുന്നു...";
            setTimeout(() => {
                winner.innerText = "🏆 വിജയി: മെമ്പർ നമ്പർ 45";
            }, 3000);
        }
    </script>
</body>
</html>
