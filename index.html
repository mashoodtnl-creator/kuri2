<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Cafe Dashboard</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 15px; margin: 0; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        table { width: 100%; margin-top: 10px; border-collapse: collapse; }
        td { padding: 8px; border-bottom: 1px solid #333; }
        h3, h4 { color: #fff; margin-top: 0; }
    </style>
</head>
<body>

<h3>Classic Cafe Dashboard</h3>
<div class="dashboard">
    <div class="card">
        <h4>Daily Report Entry</h4>
        <input type="number" id="cashIn" placeholder="Cash Collection">
        <input type="number" id="paytmIn" placeholder="Paytm Collection">
        <input type="number" id="expensesIn" placeholder="Total Expenses">
        <button onclick="calculate()">Update Report</button>
    </div>

    <div class="card">
        <h4>Financial Overview</h4>
        <p>Total Sales: ₹<span id="totSales">0</span></p>
        <p>Net Profit: ₹<span id="netProfit">0</span></p>
        <p>Profit %: <span id="profitPerc">0</span>%</p>
        <hr style="border: 0; border-top: 1px solid #444;">
        <p>Cash Balance: ₹<span id="cBal">0</span></p>
        <p>Paytm Balance: ₹<span id="pBal">0</span></p>
    </div>

    <div class="card">
        <h4>Stock List</h4>
        <input type="text" id="stockName" placeholder="Item Name">
        <button onclick="addEntry('stocks', 'stockName')">Add Stock</button>
        <table id="stockTable"></table>
    </div>

    <div class="card">
        <h4>Staff Management</h4>
        <input type="text" id="staffName" placeholder="Staff Name">
        <button onclick="addEntry('staff', 'staffName')">Add Staff</button>
        <table id="staffTable"></table>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('cafeDB')) || { stocks: [], staff: [] };

    function calculate() {
        let cash = parseFloat(document.getElementById('cashIn').value) || 0;
        let paytm = parseFloat(document.getElementById('paytmIn').value) || 0;
        let exp = parseFloat(document.getElementById('expensesIn').value) || 0;
        let sales = cash + paytm;
        let profit = sales - exp;
        document.getElementById('totSales').innerText = sales;
        document.getElementById('netProfit').innerText = profit;
        document.getElementById('profitPerc').innerText = sales > 0 ? ((profit/sales)*100).toFixed(1) : 0;
        document.getElementById('cBal').innerText = cash;
        document.getElementById('pBal').innerText = paytm;
    }

    function addEntry(key, id) {
        let val = document.getElementById(id).value;
        if(val) { db[key].push(val); localStorage.setItem('cafeDB', JSON.stringify(db)); render(); document.getElementById(id).value = ''; }
    }

    function render() {
        ['stocks', 'staff'].forEach(key => {
            let t = document.getElementById(key + 'Table');
            t.innerHTML = "";
            db[key].forEach((item, i) => {
                t.innerHTML += `<tr><td>${item}</td><td><button style="background:red; padding:2px 8px" onclick="del('${key}', ${i})">X</button></td></tr>`;
            });
        });
    }

    function del(key, i) { db[key].splice(i, 1); localStorage.setItem('cafeDB', JSON.stringify(db)); render(); }
    render();
</script>
</body>
</html>
