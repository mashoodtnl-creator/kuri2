<!DOCTYPE html>
<html lang="ml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classic Cafe - Bakery Management</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body {
      min-height: 100%;
      background:         
      font-family: 'Segoe UI', Arial;
      color:         
      overflow-x: hidden;
    }

    :root {
      --card-bg: rgba(45, 13, 0.7);
      --card-border: rgba(255, 107, 107, 0.3);
      --primary:         
      --primary-glow: rgba(255, 107, 107, 0.5);
      --secondary:         
      --success:         
      --danger:         
      --text-light:         
      --text-dim:         
    }

    body {
      background: linear-gradient(135deg,                                        
      background-attachment: fixed;
      padding: 12px;
    }
  .container { max-width: 1600px; margin: 0 auto; }

  .card {
      background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--card-border);
      border-radius: 14px; padding: 16px; margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

  .btn { width: 100%; padding: 11px; margin: 6px 0; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; }
  .btn.primary { background: linear-gradient(135deg, var(--primary),                                                                      
  .btn.secondary { background: linear-gradient(135deg, var(--secondary),                            
  .btn.success { background: linear-gradient(135deg, var(--success),                          
  .btn.danger { background: linear-gradient(135deg, var(--danger),                          
  .btn.small { width: auto; padding: 7px 14px; font-size: 12px; margin: 0 4px; }

    input, select, textarea {
      width: 100%; padding: 11px; margin: 6px 0; border: 1px solid var(--card-border);
      border-radius: 10px; font-size: 14px; background: rgba(10, 10, 0.6);
      color: var(--text-light); backdrop-filter: blur(10px);
    }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 3px var(--primary-glow); }

  .top-bar {
      position: sticky; top: 0; background: rgba(26, 10, 10, 0.98); backdrop-filter: blur(20px);
      border: 1px solid var(--card-border); border-radius: 14px; padding: 12px 16px;
      margin-bottom: 16px; display: flex; align-items: center; gap: 12px; z-index: 100;
    }
  .top-bar h2 { color: var(--primary); font-size: 22px; }
  .top-bar.btn-group { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
  .top-bar.btn { width: auto; padding: 7px 14px; margin: 0; }

  .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab-btn {
      padding: 10px 20px; border: 1px solid var(--card-border); background: var(--card-bg);
      color: var(--text-dim); border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; font-size: 14px;
    }
  .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 20px var(--primary-glow); }

  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .stat-card {
      background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid var(--card-border);
      border-radius: 14px; padding: 16px; text-align: center; position: relative; overflow: hidden;
    }
  .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
    }
  .stat-card i { font-size: 28px; color: var(--primary); margin-bottom: 6px; }
  .stat-card h2 { font-size: 24px; color: var(--primary); margin: 4px 0; }
  .stat-card p { color: var(--text-dim); font-size: 11px; }

  .table-wrapper { overflow-x: auto; border-radius: 10px; }
    table { width: 100%; border-collapse: collapse; background: rgba(10, 10, 10, 0.4); }
    th { background: rgba(255, 107, 107, 0.15); color: var(--primary); padding: 10px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--card-border); font-size: 12px; }
    td { padding: 10px; border-bottom: 1px solid rgba(255, 107, 107, 0.1); color: var(--text-light); font-size: 12px; }
    tr:hover { background: rgba(255, 107, 107, 0.05); }

  .section-title {
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
      color: var(--primary); font-size: 16px; font-weight: 600;
    }
  .section-title::before {
      content: ''; width: 4px; height: 18px; background: var(--primary);
      border-radius: 2px; box-shadow: 0 0 10px var(--primary-glow);
    }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    @media (max-width: 768px) {
  .grid-2,.grid-3,.grid-4 { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .tabs { overflow-x: auto; }
  .top-bar { flex-direction: column; align-items: flex-start; }
  .top-bar.btn-group { margin-left: 0; width: 100%; }
    }

  .calc-box {
      background: rgba(255, 209, 102, 0.1);
      border: 2px dashed var(--secondary);
      padding: 12px;
      border-radius: 10px;
      margin: 8px 0;
    }
  .calc-result {
      font-size: 20px;
      color: var(--primary);
      font-weight: bold;
      text-align: center;
      padding: 12px;
      background: rgba(255, 107, 107, 0.1);
      border-radius: 10px;
      margin-top: 8px;
    }

  .modal {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9);
      z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto;
    }
  .modal.card { max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; }
  .hidden { display: none!important; }

  .badge { padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .badge.low { background: rgba(255, 82, 82, 0.2); color: var(--danger); }
  .badge.ok { background: rgba(107, 207, 127, 0.2); color: var(--success); }
  .badge.paid { background: rgba(107, 207, 127, 0.2); color: var(--success); }
  .badge.pending { background: rgba(255, 107, 107, 0.2); color: var(--danger); }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h2><i class="ri-cup-line"></i> Classic Cafe</h2>
      <div class="btn-group">
        <button class="btn primary small" onclick="exportPDF('sales')">Sales PDF</button>
        <button class="btn secondary small" onclick="exportPDF('stock')">Stock PDF</button>
        <button class="btn success small" onclick="exportPDF('profit')">Profit PDF</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('dashboard', event)">Dashboard</button>
      <button class="tab-btn" onclick="switchTab('billing', event)">Billing</button>
      <button class="tab-btn" onclick="switchTab('stock', event)">Stock</button>
      <button class="tab-btn" onclick="switchTab('expense', event)">Expense</button>
      <button class="tab-btn" onclick="switchTab('staff', event)">Staff</button>
      <button class="tab-btn" onclick="switchTab('calculator', event)">Calculator</button>
      <button class="tab-btn" onclick="switchTab('report', event)">Reports</button>
    </div>

    <div id="tab-dashboard" class="tab-content">
      <div class="stats-grid">
        <div class="stat-card">
          <i class="ri-money-rupee-circle-fill"></i>
          <h2 id="todaySales">₹0</h2>
          <p>ഇന്നത്തെ Sale</p>
        </div>
        <div class="stat-card">
          <i class="ri-arrow-down-circle-fill"></i>
          <h2 id="todayExpense">₹0</h2>
          <p>ഇന്നത്തെ Expense</p>
        </div>
        <div class="stat-card">
          <i class="ri-funds-line"></i>
          <h2 id="todayProfit">₹0</h2>
          <p>ഇന്നത്തെ Profit</p>
        </div>
        <div class="stat-card">
          <i class="ri-alert-line"></i>
          <h2 id="lowStock">0</h2>
          <p>Low Stock Items</p>
        </div>
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="section-title"><i class="ri-line-chart-line"></i><span>Monthly Summary</span></div>
          <div class="grid-3">
            <div><p style="color:var(--text-dim)">Total Sales</p><h3 id="monthSales" style="color:var(--success)">₹0</h3></div>
            <div><p style="color:var(--text-dim)">Total Expense</p><h3 id="monthExpense" style="color:var(--danger)">₹0</h3></div>
            <div><p style="color:var(--text-dim)">Net Profit</p><h3 id="monthProfit" style="color:var(--primary)">₹0</h3></div>
          </div>
        <div class="card">
          <div class="section-title"><i class="ri-pie-chart-line"></i><span>Top Selling Items</span></div>
          <div id="topItems"></div>
        </div>
      </div>
    </div>

    <div id="tab-billing" class="tab-content hidden">
      <div class="grid-2">
        <div class="card">
          <div class="section-title"><i class="ri-add-circle-line"></i><span>Add Items to Bill</span></div>
          <select id="billItem">
            <option value="">-- Select Item --</option>
          </select>
          <div class="grid-2">
            <input type="number" id="billQty" placeholder="Quantity" value="1" min="1">
            <input type="number" id="billRate" placeholder="Rate" readonly>
          </div>
          <button class="btn primary" onclick="addToBill()">Add to Bill</button>

          <div style="margin-top:16px;">
            <h4 style="color:var(--primary); margin-bottom:8px;">Quick Items</h4>
            <div id="quickItems" style="display:grid; grid-template-columns:repeat(3,1fr); gap:6px;"></div>
          </div>
        </div>

        <div class="card">
          <div class="section-title"><i class="ri-bill-line"></i><span>Current Bill</span></div>
          <input type="text" id="customerName" placeholder="Customer Name (Optional)">
          <input type="tel" id="customerPhone" placeholder="Customer Phone (Optional)">
          <div id="billItems" style="min-height:150px; max-height:250px; overflow-y:auto;"></div>
          <div style="font-size:22px; color:var(--primary); font-weight:bold; text-align:right; padding:12px;">Total: ₹<span id="billTotal">0</span></div>
          <div class="grid-2">
            <button class="btn success" onclick="saveBill()">Save Bill</button>
            <button class="btn primary" onclick="printBill()">Print Bill</button>
          </div>
          <button class="btn secondary" onclick="clearBill()">Clear Bill</button>
        </div>
      </div>
    </div>

    <div id="tab-stock" class="tab-content hidden">
      <div class="card">
        <div class="section-title"><i class="ri-stack-line"></i><span>Stock Management</span></div>
        <div class="grid-3">
          <input type="text" id="stockItemName" placeholder="Item Name">
          <input type="number" id="stockQty" placeholder="Quantity">
          <input type="number" id="stockRate" placeholder="Purchase Rate">
        </div>
        <div class="grid-3">
          <input type="number" id="stockSellRate" placeholder="Selling Rate">
          <input type="number" id="stockMinQty" placeholder="Min Stock Alert">
          <button class="btn primary" onclick="addStock()">Add Stock</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title"><i class="ri-database-2-line"></i><span>Current Stock</span></div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Item</th>
                <th>Stock</th>
                <th>Purchase</th>
                <th>Selling</th>
                <th>Value</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="stockTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="tab-expense" class="tab-content hidden">
      <div class="card">
        <div class="section-title"><i class="ri-arrow-down-circle-line"></i><span>Add Expense</span></div>
        <div class="grid-3">
          <select id="expType">
            <option>Rent</option>
            <option>Electricity</option>
            <option>Water</option>
            <option>Staff Salary</option>
            <option>Purchase</option>
            <option>Transport</option>
            <option>Others</option>
          </select>
          <input type="number" id="expAmount" placeholder="Amount">
          <input type="date" id="expDate">
        </div>
        <textarea id="expDesc" placeholder="Description" rows="2"></textarea>
        <button class="btn primary" onclick="addExpense()">Add Expense</button>
      </div>

      <div class="card">
        <div class="section-title"><i class="ri-list-check"></i><span>Expense List</span></div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Type</th>
                <th>Description</th>
                <th>Amount</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="expenseTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="tab-staff" class="tab-content hidden">
      <div class="card">
        <div class="section-title"><i class="ri-user-add-line"></i><span>Add Staff</span></div>
        <div class="grid-3">
          <input type="text" id="staffName" placeholder="Staff Name">
          <input type="tel" id="staffPhone" placeholder="Phone">
          <input type="number" id="staffSalary" placeholder="Monthly Salary">
        </div>
        <button class="btn primary" onclick="addStaff()">Add Staff</button>
      </div>

      <div class="card">
        <div class="section-title"><i class="ri-group-line"></i><span>Staff List</span></div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Salary</th>
                <th>Advance</th>
                <th>Net Payable</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="staffTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="tab-calculator" class="tab-content hidden">
      <div class="grid-2">
        <div class="card">
          <div class="section-title"><i class="ri-percent-line"></i><span>Profit % Calculator</span></div>
          <div class="calc-box">
            <input type="number" id="costPrice" placeholder="Cost Price / വാങ്ങിയ വില">
            <input type="number" id="sellPrice" placeholder="Selling Price / വിൽക്കുന്ന വില">
            <button class="btn primary" onclick="calcProfit()">Calculate Profit %</button>
            <div class="calc-result" id="profitResult">0%</div>
          </div>
        </div>

        <div class="card">
          <div class="section-title"><i class="ri-file-text-line"></i><span>GST Calculator</span></div>
          <div class="calc-box">
            <input type="number" id="gstAmount" placeholder="Amount">
            <select id="gstRate">
              <option value="5">GST 5%</option>
              <option value="12">GST 12%</option>
              <option value="18" selected>GST 18%</option>
              <option value="28">GST 28%</option>
            </select>
            <button class="btn primary" onclick="calcGST()">Calculate GST</button>
            <div class="calc-result" id="gstResult">₹0</div>
          </div>
        </div>

        <div class="card">
          <div class="section-title"><i class="ri-price-tag-3-line"></i><span>Discount Calculator</span></div>
          <div class="calc-box">
            <input type="number" id="mrpPrice" placeholder="MRP / Original Price">
            <input type="number" id="discountPercent" placeholder="Discount %" value="10">
            <button class="btn primary" onclick="calcDiscount()">Calculate</button>
            <div class="calc-result" id="discountResult">₹0</div>
          </div>
        </div>

        <div class="card">
          <div class="section-title"><i class="ri-add-circle-line"></i><span>Markup Calculator</span></div>
          <div class="calc-box">
            <input type="number" id="markupCost" placeholder="Cost Price">
            <input type="number" id="markupPercent" placeholder="Markup % (എത്ര % ലാഭം)" value="30">
            <button class="btn primary" onclick="calcMarkup()">Calculate Selling Price</button>
            <div class="calc-result" id="markupResult">₹0</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title"><i class="ri-user-star-line"></i><span>Staff Salary % of Sales</span></div>
        <div class="grid-3">
          <input type="number" id="monthTotalSales" placeholder="Month Total Sales">
          <input type="number" id="staffSalaryPercent" placeholder="Salary %" value="10">
          <button class="btn primary" onclick="calcStaffSalary()">Calculate</button>
        </div>
        <div class="calc-result" id="staffSalaryResult">Staff Salary: ₹0</div>
      </div>
    </div>

    <div id="tab-report" class="tab-content hidden">
      <div class="card">
        <div class="section-title"><i class="ri-calendar-line"></i><span>Report Filter</span></div>
        <div class="grid-3">
          <input type="date" id="reportFrom">
          <input type="date" id="reportTo">
          <button class="btn primary" onclick="generateReport()">Generate Report</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title"><i class="ri-file-chart-line"></i><span>Sales Report</span></div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Bill No</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody id="reportTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { jsPDF } = window.jspdf;

    let db = JSON.parse(localStorage.getItem('classicCafeDB')) || {
      items: [
        {id:1, name:'Tea', stock:100, purchaseRate:8, sellRate:10, minStock:20},
        {id:2, name:'Coffee', stock:80, purchaseRate:12, sellRate:15, minStock:20},
        {id:3, name:'Puffs', stock:50, purchaseRate:15, sellRate:20, minStock:10},
        {id:4, name:'Cake', stock:30, purchaseRate:25, sellRate:35, minStock:5},
        {id:5, name:'Juice', stock:60, purchaseRate:20, sellRate:30, minStock:15}
      ],
      bills: [],
      expenses: [],
      staff: [],
      nextBillNo: 1001,
      nextItemId: 6
    };

    let currentBill = [];
    let currentDate = new Date().toISOString().slice(0,10);

           
    (function init() {
      document.getElementById('expDate').value = currentDate;
      document.getElementById('reportFrom').value = currentDate;
      document.getElementById('reportTo').value = currentDate;
      updateDashboard();
      renderStockTable();
      renderExpenseTable();
      renderStaffTable();
      loadItems();
      loadQuickItems();
    })();

    function saveDB() { localStorage.setItem('classicCafeDB', JSON.stringify(db)); }

    function switchTab(tab, event) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
      event.target.classList.add('active');
      document.getElementById('tab-' + tab).classList.remove('hidden');
      if(tab === 'dashboard') updateDashboard();
      if(tab === 'stock') renderStockTable();
      if(tab === 'expense') renderExpenseTable();
      if(tab === 'staff') renderStaffTable();
    }

                
    function updateDashboard() {
      const today = new Date().toISOString().slice(0,10);
      const todayBills = db.bills.filter(b => b.date === today);
      const todayExp = db.expenses.filter(e => e.date === today);

      const sales = todayBills.reduce((s,b) => s + b.total, 0);
      const expense = todayExp.reduce((s,e) => s + e.amount, 0);
      const profit = sales - expense;
      const lowStock = db.items.filter(i => i.stock <= i.minStock).length;

      document.getElementById('todaySales').textContent = '₹' + sales.toLocaleString();
      document.getElementById('todayExpense').textContent = '₹' + expense.toLocaleString();
      document.getElementById('todayProfit').textContent = '₹' + profit.toLocaleString();
      document.getElementById('lowStock').textContent = lowStock;

      const month = new Date().toISOString().slice(0,7);
      const monthBills = db.bills.filter(b => b.date.startsWith(month));
      const monthExp = db.expenses.filter(e => e.date.startsWith(month));
      const monthSales = monthBills.reduce((s,b) => s + b.total, 0);
      const monthExpense = monthExp.reduce((s,e) => s + e.amount, 0);

      document.getElementById('monthSales').textContent = '₹' + monthSales.toLocaleString();
      document.getElementById('monthExpense').textContent = '₹' + monthExpense.toLocaleString();
      document.getElementById('monthProfit').textContent = '₹' + (monthSales - monthExpense).toLocaleString();

      const itemSales = {};
      db.bills.forEach(b => {
        b.items.forEach(i => {
          itemSales[i.name] = (itemSales[i.name] || 0) + i.qty;
        });
      });
      const topItems = Object.entries(itemSales).sort((a,b) => b[1] - a[1]).slice(0,5);
      document.getElementById('topItems').innerHTML = topItems.map(([name, qty]) =>
        `<div style="padding:8px; border-bottom:1px solid var(--card-border); display:flex; justify-content:space-between;">
          <span>${name}</span><span style="color:var(--primary);">${qty} sold</span>
        </div>`
      ).join('') || '<p style="color:var(--text-dim); text-align:center;">No sales yet</p>';
    }

              
    function loadItems() {
      const select = document.getElementById('billItem');
      select.innerHTML = '<option value="">-- Select Item --</option>' +
        db.items.filter(i => i.stock > 0).map(i => `<option value="${i.id}" data-rate="${i.sellRate}">${i.name} (₹${i.sellRate}) - Stock: ${i.stock}</option>`).join('');
    }

    function loadQuickItems() {
      const div = document.getElementById('quickItems');
      div.innerHTML = db.items.slice(0,9).map(i =>
        `<button class="btn small" style="background:rgba(255,107,107,0.2); color:var(--primary); border:1px solid var(--primary);" onclick="quickAdd(${i.id})">${i.name}<br>₹${i.sellRate}</button>`
      ).join('');
    }

    document.getElementById('billItem').addEventListener('change', function() {
      const rate = this.options[this.selectedIndex].dataset.rate;
      document.getElementById('billRate').value = rate || '';
    });

    function quickAdd(id) {
      const item = db.items.find(i => i.id === id);
      if(!item || item.stock < 1) return alert('Out of stock!');
      document.getElementById('billItem').value = id;
      document.getElementById('billRate').value = item.sellRate;
      document.getElementById('billQty').value = 1;
      addToBill();
    }

    function addToBill() {
      const itemId = parseInt(document.getElementById('billItem').value);
      const qty = parseInt(document.getElementById('billQty').value);
      const rate = parseFloat(document.getElementById('billRate').value);

      if(!itemId ||!qty ||!rate) return alert('Select item and quantity');

      const item = db.items.find(i => i.id === itemId);
      if(item.stock < qty) return alert(`Only ${item.stock} available!`);
