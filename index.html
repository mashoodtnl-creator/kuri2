<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>Classic Cafe | Management Dashboard</title>
    <style>
        :root { --bg: #f8f9fa; --card: #ffffff; --primary: #2d3436; --accent: #0984e3; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--primary); padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .full-width { grid-column: 1 / -1; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 100%; margin: 5px 0; }
        button { padding: 10px 15px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>Classic Cafe Dashboard</h2>
    
    <div class="dashboard">
        <div class="card">
            <h3>Daily Report Entry</h3>
            <input type="number" id="cashIn" placeholder="Cash Collection">
            <input type="number" id="paytmIn" placeholder="Paytm Collection">
            <input type="number" id="expensesIn" placeholder="Total Expenses">
            <button onclick="calculate()">Update Report</button>
        </div>
        <div class="card">
            <h3>Financial Overview</h3>
            <p>Total Sales: ₹<span id="totSales">0</span></p>
            <p>Net Profit: ₹<span id="netProfit">0</span></p>
            <p>Profit %: <span id="profitPerc">0</span>%</p>
            <hr>
            <p>Cash Balance: ₹<span id="cBal">0</span></p>
            <p>Paytm Balance: ₹<span id="pBal">0</span></p>
        </div>
    </div>

    <div class="dashboard">
        <div class="card">
            <h3>Stock List</h3>
            <input type="text" id="stockName" placeholder="Item Name">
            <button onclick="addEntry('stocks', 'stockName')">Add Stock</button>
            <table id="stockTable"></table>
        </div>
        <div class="card">
            <h3>Staff Management</h3>
            <input type="text" id="staffName" placeholder="Staff Name">
            <button onclick="addEntry('staff', 'staffName')">Add Staff</button>
            <table id="staffTable"></table>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('cafeDB')) || { stocks: [], staff: [] };

    function calculate() {
        let cash = parseFloat(document.getElementById('cashIn').value) || 0;
        let paytm = parseFloat(document.getElementById('paytmIn').value) || 0;
        let exp = parseFloat(document.getElementById('expensesIn').value) || 0;
        
        let sales = cash + paytm;
        let profit = sales - exp;
        let perc = sales > 0 ? ((profit / sales) * 100).toFixed(2) : 0;

        document.getElementById('totSales').innerText = sales;
        document.getElementById('netProfit').innerText = profit;
        document.getElementById('profitPerc').innerText = perc;
        document.getElementById('cBal').innerText = cash;
        document.getElementById('pBal').innerText = paytm;
    }

    function addEntry(key, inputId) {
        let val = document.getElementById(inputId).value;
        if(val) {
            db[key].push(val);
            localStorage.setItem('cafeDB', JSON.stringify(db));
            render();
        }
    }

    function render() {
        ['stocks', 'staff'].forEach(key => {
            let table = document.getElementById(key + 'Table');
            table.innerHTML = "<tr><th>Name</th><th>Action</th></tr>";
            db[key].forEach((item, index) => {
                table.innerHTML += `<tr><td>${item}</td><td><button onclick="del('${key}', ${index})">Del</button></td></tr>`;
            });
        });
    }

    function del(key, i) {
        db[key].splice(i, 1);
        localStorage.setItem('cafeDB', JSON.stringify(db));
        render();
    }

    render();
</script>
</body>
</html>
