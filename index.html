<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>Classic Cafe Premium Dashboard</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1, h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { padding: 20px; border-radius: 10px; background: #fff; border: 1px solid #eee; transition: 0.3s; }
        .card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .stat-box { font-size: 1.2em; font-weight: bold; color: var(--primary); margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>Classic Cafe Premium Dashboard</h1>
    
    <div class="dashboard-grid">
        <div class="card">
            <h3>Daily Sales & Expenses</h3>
            <input type="month" id="monthInput">
            <input type="number" id="cashSale" placeholder="Cash Collection">
            <input type="number" id="paytmSale" placeholder="Paytm Collection">
            <input type="number" id="expenses" placeholder="Total Expenses">
            <button onclick="saveData()">Add Daily Report</button>
        </div>

        <div class="card">
            <h3>Monthly Overview</h3>
            <div class="stat-box">Total Sales: <span id="totSales">0</span></div>
            <div class="stat-box">Net Profit: <span id="netProfit">0</span></div>
            <div class="stat-box">Profit %: <span id="profitPerc">0</span>%</div>
            <hr>
            <p>Cash Balance: <span id="cashBal">0</span></p>
            <p>Paytm Balance: <span id="paytmBal">0</span></p>
        </div>
    </div>

    <table id="reportTable">
        <tr><th>Month</th><th>Cash</th><th>Paytm</th><th>Expenses</th><th>Action</th></tr>
    </table>
</div>

<script>
    let reports = JSON.parse(localStorage.getItem('cafeReports')) || [];

    function saveData() {
        let m = document.getElementById('monthInput').value;
        let c = parseFloat(document.getElementById('cashSale').value) || 0;
        let p = parseFloat(document.getElementById('paytmSale').value) || 0;
        let e = parseFloat(document.getElementById('expenses').value) || 0;
        
        if(!m) { alert("Please select a month"); return; }

        reports.push({m, c, p, e});
        localStorage.setItem('cafeReports', JSON.stringify(reports));
        renderTable();
    }

    function renderTable() {
        let table = document.getElementById('reportTable');
        table.innerHTML = "<tr><th>Month</th><th>Cash</th><th>Paytm</th><th>Expenses</th><th>Action</th></tr>";
        let totalS = 0, totalP = 0, totalC = 0;

        reports.forEach((item, index) => {
            let sale = item.c + item.p;
            totalS += sale;
            totalC += item.c;
            totalP += item.p;
            table.innerHTML += `<tr><td>${item.m}</td><td>${item.c}</td><td>${item.p}</td><td>${item.e}</td>
            <td><button onclick="deleteRow(${index})" style="background:red">Del</button></td></tr>`;
        });

        document.getElementById('totSales').innerText = totalS;
        document.getElementById('cashBal').innerText = totalC;
        document.getElementById('paytmBal').innerText = totalP;
        document.getElementById('netProfit').innerText = (totalS - totalP); // Simple logic
    }

    function deleteRow(i) { reports.splice(i, 1); localStorage.setItem('cafeReports', JSON.stringify(reports)); renderTable(); }
    renderTable();
</script>

</body>
</html>
