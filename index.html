<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Cafe Pro Dashboard</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent: #38bdf8;
            --danger: #f43f5e;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .header { margin-bottom: 20px; border-left: 5px solid var(--accent); padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); backdrop-filter: blur(10px); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); }
        h4 { margin-top: 0; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #334155; border: none; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); border: none; color: #0f172a; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; }
        table { width: 100%; margin-top: 15px; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid #334155; }
        .del-btn { background: var(--danger); color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Classic Cafe</h1>
        <p>Management Control Center</p>
    </div>

    <div class="grid">
        <div class="card">
            <h4>Daily Entry</h4>
            <input type="number" id="cashIn" placeholder="Cash Sale (₹)">
            <input type="number" id="paytmIn" placeholder="Paytm Sale (₹)">
            <input type="number" id="expensesIn" placeholder="Expenses (₹)">
            <button onclick="calculate()">Update Dashboard</button>
        </div>

        <div class="card">
            <h4>Financial Summary</h4>
            <div class="stat-row"><span>Total Sales</span><strong id="totSales">₹0</strong></div>
            <div class="stat-row"><span>Net Profit</span><strong id="netProfit">₹0</strong></div>
            <div class="stat-row"><span>Profit Margin</span><strong id="profitPerc">0%</strong></div>
            <div class="stat-row"><span>Cash Balance</span><strong id="cBal">₹0</strong></div>
            <div class="stat-row"><span>Paytm Balance</span><strong id="pBal">₹0</strong></div>
        </div>

        <div class="card">
            <h4>Stock List</h4>
            <input type="text" id="stockName" placeholder="New Item...">
            <button onclick="addEntry('stocks', 'stockName')">Add Item</button>
            <table id="stockTable"></table>
        </div>

        <div class="card">
            <h4>Staff Management</h4>
            <input type="text" id="staffName" placeholder="Staff Name...">
            <button onclick="addEntry('staff', 'staffName')">Add Member</button>
            <table id="staffTable"></table>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('cafeDB')) || { stocks: [], staff: [] };

    function calculate() {
        let cash = parseFloat(document.getElementById('cashIn').value) || 0;
        let paytm = parseFloat(document.getElementById('paytmIn').value) || 0;
        let exp = parseFloat(document.getElementById('expensesIn').value) || 0;
        let sales = cash + paytm;
        let profit = sales - exp;
        document.getElementById('totSales').innerText = "₹" + sales;
        document.getElementById('netProfit').innerText = "₹" + profit;
        document.getElementById('profitPerc').innerText = sales > 0 ? ((profit/sales)*100).toFixed(1) + "%" : "0%";
        document.getElementById('cBal').innerText = "₹" + cash;
        document.getElementById('pBal').innerText = "₹" + paytm;
    }

    function addEntry(key, id) {
        let val = document.getElementById(id).value;
        if(val) { db[key].push(val); localStorage.setItem('cafeDB', JSON.stringify(db)); render(); document.getElementById(id).value = ''; }
    }

    function render() {
        ['stocks', 'staff'].forEach(key => {
            let t = document.getElementById(key + 'Table');
            t.innerHTML = "";
            db[key].forEach((item, i) => {
                t.innerHTML += `<tr><td>${item}</td><td><span class="del-btn" onclick="del('${key}', ${i})">✕</span></td></tr>`;
            });
        });
    }

    function del(key, i) { db[key].splice(i, 1); localStorage.setItem('cafeDB', JSON.stringify(db)); render(); }
    render();
</script>
</body>
</html>
