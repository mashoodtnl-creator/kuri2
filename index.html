<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <title>Classic Cafe Pro</title>
    <style>
        body { font-family: sans-serif; background: #eef; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { border: 1px solid #ccc; padding: 15px; border-radius: 8px; }
        input { padding: 8px; margin: 5px 0; width: 90%; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>Classic Cafe Management System</h2>
    
    <div class="grid">
        <div class="card">
            <h3>Sales & Collection</h3>
            <input type="number" id="cashSale" placeholder="Cash Sale">
            <input type="number" id="paytmSale" placeholder="Paytm Sale">
            <button onclick="saveSales()">Update Sales</button>
        </div>
        <div class="card">
            <h3>Daily Overview</h3>
            <p>Total Sales: <span id="totalSales">0</span></p>
            <p>Cash Balance: <span id="cashBal">0</span></p>
            <p>Paytm Balance: <span id="paytmBal">0</span></p>
        </div>
    </div>

    <div class="card" style="margin-top:20px;">
        <h3>Stock & Staff Management</h3>
        <input type="text" id="newItem" placeholder="Item/Staff Name">
        <button onclick="addItem()">Add to List</button>
        <table id="listTable">
            <tr><th>Name</th><th>Action</th></tr>
        </table>
    </div>
</div>

<script>
    let items = JSON.parse(localStorage.getItem('cafeItems')) || [];

    function saveSales() {
        let cash = parseFloat(document.getElementById('cashSale').value) || 0;
        let paytm = parseFloat(document.getElementById('paytmSale').value) || 0;
        document.getElementById('totalSales').innerText = cash + paytm;
        document.getElementById('cashBal').innerText = cash;
        document.getElementById('paytmBal').innerText = paytm;
    }

    function addItem() {
        let name = document.getElementById('newItem').value;
        if(name) {
            items.push(name);
            localStorage.setItem('cafeItems', JSON.stringify(items));
            renderList();
        }
    }

    function renderList() {
        let table = document.getElementById('listTable');
        table.innerHTML = "<tr><th>Name</th><th>Action</th></tr>";
        items.forEach((item, index) => {
            table.innerHTML += `<tr><td>${item}</td><td><button onclick="deleteItem(${index})">Delete</button></td></tr>`;
        });
    }

    function deleteItem(index) {
        items.splice(index, 1);
        localStorage.setItem('cafeItems', JSON.stringify(items));
        renderList();
    }

    renderList();
</script>

</body>
</html>
